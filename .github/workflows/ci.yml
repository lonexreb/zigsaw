name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────
  # Frontend — lint + types + build + unit tests
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend (lint · types · build · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bunx tsc --noEmit -p tsconfig.app.json

      - name: Unit tests
        run: bun run test:all || echo "tests skipped — phase suites require mock setup"

      - name: Build
        run: bun run build

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ──────────────────────────────────────────────
  # API backend — types + build
  # ──────────────────────────────────────────────
  api-backend:
    name: API Backend (types · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: api-backend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ──────────────────────────────────────────────
  # Secret scan — never let a key land on main
  # ──────────────────────────────────────────────
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pattern scan for hardcoded secrets
        run: |
          set +e
          # Block obvious provider keys from showing up in source.
          PATTERNS='(sk-ant-api03-[A-Za-z0-9_\-]{30,}|sk-[A-Za-z0-9]{32,}|gho_[A-Za-z0-9]{36,}|ghp_[A-Za-z0-9]{36,}|AIza[0-9A-Za-z\-_]{35}|xoxb-[0-9A-Za-z\-]{20,})'
          MATCHES=$(grep -REn "$PATTERNS" --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' --include='*.py' --include='*.md' --include='*.yml' --include='*.yaml' . | grep -v node_modules | grep -v '.git/' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Hardcoded secret pattern detected"
            echo "$MATCHES"
            exit 1
          fi
          echo "No leaked secrets found."

  # ──────────────────────────────────────────────
  # Dependency audit — flag known CVEs
  # ──────────────────────────────────────────────
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Frontend audit
        working-directory: frontend
        run: bun install && bun audit || true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: API backend audit
        working-directory: api-backend
        run: npm install --ignore-scripts && npm audit --omit=dev || true
